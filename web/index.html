<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Ages of Aether</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      outline: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Ages of Aether…</div>
  <script type="module">
    import init from './ages-of-aether.js';
    const removeLoader = () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    };
    // winit on web throws a "control flow" exception to unwind the event loop.
    // That isn't a real error — game keeps running. Hide the loader either way.
    init('./ages-of-aether_bg.wasm')
      .then(removeLoader)
      .catch((err) => {
        const msg = err && err.message ? err.message : String(err);
        if (msg.includes('Using exceptions for control flow')) {
          removeLoader();
        } else {
          const el = document.getElementById('loading');
          if (el) el.textContent = 'Failed to load: ' + msg;
          console.error(err);
        }
      });
  </script>
</body>
</html>
